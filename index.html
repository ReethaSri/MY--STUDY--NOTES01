<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub - Final Creative Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Deep Indigo to Dark Blue - Study Theme */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            overflow: hidden;
            position: relative;
        }

        /* --- Creative Study Background Animation --- */
        .study-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .study-elements i {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-size: 1.5em;
            animation: floatStudyElems linear infinite;
        }

        @keyframes floatStudyElems {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-1000px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Atom positions, sizes, and delays */
        .study-elements i:nth-child(1) { left: 10%; font-size: 2em; animation-duration: 25s; }
        .study-elements i:nth-child(2) { left: 20%; animation-duration: 18s; animation-delay: 2s; }
        .study-elements i:nth-child(3) { left: 25%; font-size: 1.8em; animation-duration: 22s; }
        .study-elements i:nth-child(4) { left: 40%; font-size: 2.5em; animation-duration: 28s; animation-delay: 4s; }
        .study-elements i:nth-child(5) { left: 55%; font-size: 1.3em; animation-duration: 20s; }
        .study-elements i:nth-child(6) { left: 65%; font-size: 2.8em; animation-duration: 32s; }
        .study-elements i:nth-child(7) { left: 75%; font-size: 2em; animation-duration: 24s; animation-delay: 3s; }
        .study-elements i:nth-child(8) { left: 85%; font-size: 1em; animation-duration: 15s; }
        .study-elements i:nth-child(9) { left: 90%; font-size: 2.2em; animation-duration: 30s; animation-delay: 1s; }
        .study-elements i:nth-child(10) { left: 5%; font-size: 1.5em; animation-duration: 27s; animation-delay: 5s;}


        /* --- Top Quote Animation --- */
        .quote-header {
            position: absolute;
            top: 8%;
            text-align: center;
            opacity: 0;
            animation: fadeInQuote 3.5s ease-in-out forwards;
            z-index: 5;
            color: rgba(255, 255, 255, 0.9);
        }

        @keyframes fadeInQuote {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .quote-header p {
            font-size: 1.2em;
            font-style: italic;
        }

        .quote-header span {
            font-weight: 600;
            color: #00f2fe; /* Accent color */
        }


        /* --- Modern Glassmorphism Login Box --- */
        .registration-box {
            position: relative;
            width: 450px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); /* Safari support */
            text-align: center;
            color: #fff;
            z-index: 10;
            overflow: hidden;
        }

        /* Study Icon in Title */
        h2 i {
            font-size: 0.9em;
            color: #4facfe;
            margin-right: 10px;
        }

        h2 {
            margin-bottom: 35px;
            font-size: 2.2em;
            font-weight: 600;
            letter-spacing: 2px;
            color: #f0f0f0;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 12px 10px;
            font-size: 16px;
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            outline: none;
            transition: 0.5s;
        }

        .input-group label {
            position: absolute;
            top: 0;
            left: 10px;
            padding: 12px 0;
            font-size: 16px;
            pointer-events: none;
            transition: 0.5s;
            color: rgba(255, 255, 255, 0.6);
        }

        /* Focus & Valid State - Floating labels and accent color */
        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -22px;
            left: 5px;
            color: #4facfe;
            font-size: 12px;
            font-weight: bold;
        }

        .input-group input:focus,
        .input-group input:valid {
            border-bottom: 2px solid #4facfe;
        }

        /* Error message styling */
        .error-message {
            color: #ff4d4d;
            font-size: 0.9em;
            position: absolute;
            bottom: -20px;
            left: 10px;
            visibility: hidden;
        }


        /* --- Creative Button with Shine & Glow --- */
        button {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            padding: 13px 25px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1.15em;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.5s;
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Shine Effect */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.6s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            box-shadow: 0 10px 30px rgba(0, 242, 254, 0.6);
            transform: translateY(-3px);
            background: linear-gradient(to right, #00f2fe 0%, #4facfe 100%);
        }

        /* Button Study Icon */
        button i {
            margin-right: 8px;
            font-size: 0.9em;
        }


        .footer-links {
            margin-top: 25px;
            font-size: 1em;
            color: rgba(255, 255, 255, 0.7);
        }

        .footer-links a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .footer-links a:hover {
            color: #fff;
            text-shadow: 0 0 8px #00f2fe;
        }

    </style>
</head>
<body>

    <div class="study-elements">
        <i class="fa-solid fa-atom"></i>
        <i class="fa-solid fa-book-open"></i>
        <i class="fa-solid fa-feather-pointed"></i>
        <i class="fa-solid fa-microscope"></i>
        <i class="fa-solid fa-pen-fancy"></i>
        <i class="fa-solid fa-laptop-code"></i>
        <i class="fa-solid fa-atom"></i>
        <i class="fa-solid fa-graduation-cap"></i>
        <i class="fa-solid fa-brain"></i>
        <i class="fa-solid fa-book-skull"></i>
    </div>

    <div class="quote-header">
        <p>"The only way to do <span>great work</span> is to <span>love what you do</span>."</p>
    </div>

    <div class="registration-box">
        <h2><i class="fa-solid fa-user-plus"></i>Register</h2>
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" name="username" required>
                <label>Username</label>
            </div>
            <div class="input-group">
                <input type="email" id="email" name="email" required>
                <label>Email ID</label>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" required>
                <label>Password</label>
            </div>
            <div class="input-group">
                <input type="password" id="confirm_password" name="confirm_password" required>
                <label>Confirm Password</label>
                <span id="passwordError" class="error-message">Passwords do not match!</span>
            </div>
            <button type="submit"><i class="fa-solid fa-rocket"></i>Get Started</button>
        </form>
        <div class="footer-links">
            Already a member? <a href="#">Log In</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('registerForm');
        const password = document.getElementById('password');
        const confirmPassword = document.getElementById('confirm_password');
        const errorMsg = document.getElementById('passwordError');

        form.addEventListener('submit', (e) => {
            // Preventing form submission to check validation
            e.preventDefault();

            if (password.value !== confirmPassword.value) {
                // Passwords don't match
                errorMsg.style.visibility = 'visible';
                confirmPassword.style.borderBottom = '2px solid #ff4d4d'; // Red underline
                password.style.borderBottom = '2px solid #ff4d4d'; // Red underline
            } else {
                // Passwords match
                errorMsg.style.visibility = 'hidden';
                confirmPassword.style.borderBottom = '2px solid #28a745'; // Green underline
                password.style.borderBottom = '2px solid #28a745'; // Green underline
                alert('Registration Successful! (In real, it will submit to server)');
                // form.submit(); // Uncomment to submit form to server
            }
        });

        // Hide error on input
        confirmPassword.addEventListener('input', () => {
            if (errorMsg.style.visibility === 'visible') {
                errorMsg.style.visibility = 'hidden';
                confirmPassword.style.borderBottom = '2px solid #fff'; // Reset underline
                password.style.borderBottom = '2px solid #fff'; // Reset underline
            }
        });
    </script>

</body>
